    <!-- Credit Card Form  -->
<div class="form">
    <form>
        <div class="row-container">
            <div class="input-container">
                <label for="number" class="subtext"> Card Number </label>
                <input type="text" class="input" id="number" value="Card Number"></input>
            </div>
            <div class="input-container">
                <label for="name" class="subtext"> Card Name </label>
                <input type="text" class="input" id="name" value="Card Name"></input>
            </div>
        </div>
        
        
        <div class="small-fields">
            <fieldset>
                <legend>Expiration Date</legend>  
                <input type="text" value="Card Number" placeholder="Card Number"></input>
                <input type="text" value="Card Number" placeholder="Card Number"></input>
            </fieldset>
            <label> CVW </label>
            <input type="text" value="Card Number" placeholder="Card Number"></input>
        </div>
        
    </form>
</div>
    

<form name="message" method="post">
    <section>

  <div style="float:left;margin-right:20px;">
    <label for="name">Name</label>
    <input id="name" type="text" value="" name="name">
  </div>

  <div style="float:left;">
    <label for="email">Email</label>
    <input id="email" type="text" value="" name="email">
  </div>

  <br style="clear:both;" />

    </section>

    <section>

    <label for="subject">Subject</label>
    <input id="subject" type="text" value="" name="subject">
    <label for="message">Message</label>
    <input id="message" type="text" value="" name="message">

    </section>
</form>
