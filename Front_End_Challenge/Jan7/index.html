    <body>
        <script>

            var message = "hello world";
            addMessage = () => {
                document.getElementById('button-message').innerHTML= message === 'hello' ? 'what' : 'bye';
                document.getElementById('button-message').style.color = 'blue' ? 'red' : 'blue';

            }

        </script>

        <button id="button-message" onclick="addMessage()"> Hello </button>
    </body>
